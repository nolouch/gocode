# gcode configuration file
# Place in: .gcode/config.yaml or ~/.config/gcode/config.yaml

provider:
  # OpenAI-compatible provider base URL
  # Examples:
  #   OpenAI:   https://api.openai.com/v1
  #   Ollama:   http://localhost:11434/v1
  #   Groq:     https://api.groq.com/openai/v1
  base_url: https://api.openai.com/v1

  # API key (or set via OPENAI_API_KEY env var)
  api_key: ""

  # Model to use
  model: gpt-4o

# Default agent: "build" or "explore" or any custom agent name
default_agent: build

