# ─── MCP Servers ─────────────────────────────────────────────────────────────
# Define Model Context Protocol servers to extend the tool set.
mcp:
  # Example: local MCP server via stdio
  # my-tools:
  #   type: local
  #   command: ["npx", "-y", "@my-org/mcp-server"]
  #   env:
  #     MY_VAR: value
  #   enabled: true
  #   timeout_ms: 30000

  # Example: remote MCP server via HTTP
  # remote-server:
  #   type: remote
  #   url: https://my-mcp-server.example.com/mcp
  #   headers:
  #     Authorization: "Bearer my-token"
  #   enabled: true

# ─── Skills ──────────────────────────────────────────────────────────────────
# Additional directories to scan for SKILL.md files.
# Standard locations are always scanned automatically:
#   .agents/skills/, .claude/skills/, .opencode/skill/
skills:
  paths: []
